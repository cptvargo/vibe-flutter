workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.playvibemusic.vibe
      groups:
        - vibe-secrets
      vars:
        BUNDLE_ID: com.playvibemusic.vibe
      flutter: 3.44.4
      xcode: latest

    integrations:
      app_store_connect: Codemagic

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Create private config
        script: |
          python3 - <<'PY'
          import os, pathlib
          pathlib.Path("lib/config").mkdir(parents=True, exist_ok=True)
          s   = os.environ["VIBE_SERVER_URL"]
          a   = os.environ["VIBE_API_KEY"]
          u   = os.environ["VIBE_USER_ID"]
          lib = os.environ["VIBE_LIBRARY_ID"]
          cs  = os.environ["VIBE_COLOR_SERVER"]
          su  = os.environ["SUPABASE_URL"]
          sa  = os.environ["SUPABASE_ANON_KEY"]
          content = (
            "class VibeConfig {\n"
            f"  static const String serverUrl    = '{s}';\n"
            f"  static const String apiKey       = '{a}';\n"
            f"  static const String userId       = '{u}';\n"
            f"  static const String vibeLibrary  = '{lib}';\n"
            f"  static const String colorServer  = '{cs}';\n"
            f"  static const String supabaseUrl  = '{su}';\n"
            f"  static const String supabaseAnon = '{sa}';\n"
            "}\n"
          )
          pathlib.Path("lib/config/vibe_config.dart").write_text(content)
          print("vibe_config.dart created")
          PY

      - name: Get Flutter packages
        script: flutter pub get

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
