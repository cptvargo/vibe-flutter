workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.playvibemusic.vibe
      vars:
        BUNDLE_ID: com.playvibemusic.vibe
        XCODE_SCHEME: Runner
        XCODE_WORKSPACE: ios/Runner.xcworkspace
      flutter: 3.44.4
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Create private config
        script: |
          python3 - <<'PY'
          import os, pathlib
          pathlib.Path("lib/config").mkdir(parents=True, exist_ok=True)
          content = (
            "class VibeConfig {\n"
            f"  static const String serverUrl    = '{os.environ[\"VIBE_SERVER_URL\"]}';\n"
            f"  static const String apiKey       = '{os.environ[\"VIBE_API_KEY\"]}';\n"
            f"  static const String userId       = '{os.environ[\"VIBE_USER_ID\"]}';\n"
            f"  static const String vibeLibrary  = '{os.environ[\"VIBE_LIBRARY_ID\"]}';\n"
            f"  static const String colorServer  = '{os.environ[\"VIBE_COLOR_SERVER\"]}';\n"
            f"  static const String supabaseUrl  = '{os.environ[\"SUPABASE_URL\"]}';\n"
            f"  static const String supabaseAnon = '{os.environ[\"SUPABASE_ANON_KEY\"]}';\n"
            "}\n"
          )
          pathlib.Path("lib/config/vibe_config.dart").write_text(content)
          print("vibe_config.dart created")
          PY

      - name: Get Flutter packages
        script: flutter pub get

      - name: Flutter analyze
        script: flutter analyze --no-pub

      - name: Build iOS release
        script: |
          flutter build ios --release --no-codesign

      - name: Set up code signing and build IPA
        script: |
          xcode-project use-profiles
          cd ios && xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            | xcpretty

          xcodebuild \
            -exportArchive \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath ../build/ios/ipa \
            | xcpretty

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
